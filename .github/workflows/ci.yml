name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clipcrate
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: clipcrate
      - run: cargo check --all-targets
      - run: cargo test --workspace --lib

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clips-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: clips-web/package-lock.json
      - run: npm ci
      - run: npm run build

  verifier:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clips-verifier
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: clips-verifier/package-lock.json
      - run: npm ci
      - run: npx vitest run
