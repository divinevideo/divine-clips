services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: clipcrate
      POSTGRES_USER: clipcrate
      POSTGRES_PASSWORD: clipcrate
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clipcrate"]
      interval: 5s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - chdata:/var/lib/clickhouse

  clipcrate:
    build:
      context: clipcrate
    environment:
      DATABASE_URL: postgres://clipcrate:clipcrate@postgres:5432/clipcrate
      CLICKHOUSE_URL: http://clickhouse:8123
      RUST_LOG: clipcrate=debug,info
      PORT: "3100"
    ports:
      - "3100:3100"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_started

volumes:
  pgdata:
  chdata:
