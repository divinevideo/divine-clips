services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: clipcrate
      POSTGRES_USER: clipcrate
      POSTGRES_PASSWORD: clipcrate
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clipcrate"]
      interval: 5s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - chdata:/var/lib/clickhouse

  clipcrate:
    build:
      context: clipcrate
    environment:
      DATABASE_URL: postgres://clipcrate:clipcrate@postgres:5432/clipcrate
      CLICKHOUSE_URL: http://clickhouse:8123
      RUST_LOG: clipcrate=debug,info
      PORT: "3100"
      CDK_MINT_URL: http://cdk-mintd:3338
    ports:
      - "3100:3100"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_started

  phoenixd:
    image: ghcr.io/acinq/phoenixd:latest
    volumes:
      - phoenixd_data:/data
    ports:
      - "9740:9740"

  cdk-mintd:
    image: ghcr.io/cashubtc/cdk-mintd:latest
    environment:
      CDK_MINTD_LISTEN_HOST: "0.0.0.0"
      CDK_MINTD_LISTEN_PORT: "3338"
      CDK_MINTD_DATABASE: "sqlite"
      CDK_MINTD_DATABASE_PATH: "/data/mint.redb"
    volumes:
      - mint_data:/data
    ports:
      - "3338:3338"
    depends_on:
      - phoenixd

volumes:
  pgdata:
  chdata:
  phoenixd_data:
  mint_data:
